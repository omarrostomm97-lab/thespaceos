<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>The Space OS</title>
    <meta name="description" content="The Space OS — All-in-one business operations management software for gaming lounges, coworking spaces, cafés, and restaurants." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="The Space OS" />
    <meta property="og:description" content="Manage sessions, bookings, orders, staff, shifts, payments, and reports — all in one platform." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Space OS" />
    <meta name="twitter:description" content="Manage sessions, bookings, orders, staff, shifts, payments, and reports — all in one platform." />
    <link rel="icon" type="image/png" sizes="any" href="%BASE_URL%the-space-os-logo.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%the-space-os-logo.png" />
    <script>
      (function () {
        var canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        var ctx = canvas.getContext('2d');
        var img = new Image();
        img.onload = function () {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, 256, 256);
          var scale = Math.min(216 / img.naturalWidth, 216 / img.naturalHeight);
          var w = img.naturalWidth * scale;
          var h = img.naturalHeight * scale;
          ctx.drawImage(img, (256 - w) / 2, (256 - h) / 2, w, h);
          var link = document.querySelector('link[rel="icon"]');
          if (link) link.href = canvas.toDataURL('image/png');
        };
        img.crossOrigin = 'anonymous';
        img.src = '%BASE_URL%the-space-os-logo.png';
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
