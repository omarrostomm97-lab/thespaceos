kind = "web"
previewPath = "/"
title = "Gaming Lounge OS"
version = "1.0.0"
id = "artifacts/gaming-lounge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20235

[services.development]
run = "pnpm --filter @workspace/gaming-lounge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gaming-lounge", "run", "build" ]
publicDir = "artifacts/gaming-lounge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20235"
BASE_PATH = "/"
