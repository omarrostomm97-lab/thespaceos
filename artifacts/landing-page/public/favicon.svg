<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="#0d1b4b"/>
  <!-- Outer left bracket top-left arm -->
  <rect x="28" y="30" width="16" height="16" rx="4" fill="#1d4ed8"/>
  <rect x="28" y="46" width="16" height="36" rx="3" fill="#1d4ed8"/>
  <rect x="28" y="82" width="16" height="16" rx="4" fill="#1d4ed8"/>
  <!-- Left bracket horizontals -->
  <rect x="44" y="30" width="22" height="16" rx="4" fill="#1d4ed8"/>
  <rect x="44" y="82" width="22" height="16" rx="4" fill="#1d4ed8"/>
  <!-- Inner left column -->
  <rect x="66" y="50" width="16" height="16" rx="4" fill="#3b82f6"/>
  <rect x="66" y="82" width="16" height="16" rx="4" fill="#3b82f6"/>
  <!-- Center cyan square -->
  <rect x="82" y="66" width="16" height="16" rx="3" fill="#06b6d4"/>
  <!-- Inner right column -->
  <rect x="98" y="50" width="16" height="16" rx="4" fill="#3b82f6"/>
  <rect x="98" y="82" width="16" height="16" rx="4" fill="#3b82f6"/>
  <!-- Outer right bracket top-right arm -->
  <rect x="136" y="30" width="16" height="16" rx="4" fill="#1d4ed8"/>
  <rect x="136" y="46" width="16" height="36" rx="3" fill="#1d4ed8"/>
  <rect x="136" y="82" width="16" height="16" rx="4" fill="#1d4ed8"/>
  <!-- Right bracket horizontals -->
  <rect x="114" y="30" width="22" height="16" rx="4" fill="#1d4ed8"/>
  <rect x="114" y="82" width="22" height="16" rx="4" fill="#1d4ed8"/>
  <!-- Bottom wordmark area: simple "OS" hint as two squares -->
  <rect x="44" y="118" width="40" height="14" rx="4" fill="#1d4ed8" opacity="0.7"/>
  <rect x="96" y="118" width="40" height="14" rx="4" fill="#1d4ed8" opacity="0.7"/>
</svg>
