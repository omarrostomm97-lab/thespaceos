components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ImpersonateResponse:
      type: object
      required: [token, tenant]
      properties:
        token:
          type: string
        tenant:
          $ref: "#/components/schemas/Tenant"

    BreakdownResponse:
      type: object
      required: [period, source, gaming, roomOrders, buffet, grandTotal]
      properties:
        period:
          type: string
        source:
          type: string
        grandTotal:
          type: number
        gaming:
          type: object
          required: [total, byType]
          properties:
            total:
              type: number
            byType:
              type: array
              items:
                type: object
                required: [type, typeAr, total, sessions]
                properties:
                  type:
                    type: string
                  typeAr:
                    type: string
                  total:
                    type: number
                  sessions:
                    type: integer
        roomOrders:
          type: object
          required: [total, byCategory]
          properties:
            total:
              type: number
            byCategory:
              type: array
              items:
                type: object
                properties:
                  categoryId:
                    type: integer
                    nullable: true
                  categoryName:
                    type: string
                  categoryNameAr:
                    type: string
                    nullable: true
                  total:
                    type: number
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: integer
                        name:
                          type: string
                        nameAr:
                          type: string
                          nullable: true
                        quantity:
                          type: integer
                        total:
                          type: number
        buffet:
          type: object
          required: [total, byCategory]
          properties:
            total:
              type: number
            byCategory:
              type: array
              items:
                type: object
                properties:
                  categoryId:
                    type: integer
                    nullable: true
                  categoryName:
                    type: string
                  categoryNameAr:
                    type: string
                    nullable: true
                  total:
                    type: number
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        productId:
                          type: integer
                        name:
                          type: string
                        nameAr:
                          type: string
                          nullable: true
                        quantity:
                          type: integer
                        total:
                          type: number

    # ── AUTH SCHEMAS ──
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ── TENANT SCHEMAS ──
    Tenant:
      type: object
      required: [id, name, slug, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        slug:
          type: string
        isActive:
          type: boolean
        language:
          type: string
          enum: [ar, en]
        createdAt:
          type: string
          format: date-time

    TenantInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        nameAr:
          type: string
        slug:
          type: string
        language:
          type: string
          enum: [ar, en]

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
        language:
          type: string
          enum: [ar, en]
        isActive:
          type: boolean

    # ── USER SCHEMAS ──
    User:
      type: object
      required: [id, email, name, role, isActive, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        role:
          type: string
          enum: [platform_owner, owner, manager, cashier, buffet_worker]
        tenantId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [email, name, role, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        nameAr:
          type: string
        role:
          type: string
          enum: [owner, manager, cashier, buffet_worker]
        password:
          type: string
        tenantId:
          type: integer

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
        role:
          type: string
          enum: [owner, manager, cashier, buffet_worker]
        password:
          type: string

    # ── ASSET SCHEMAS ──
    Asset:
      type: object
      required: [id, name, type, pricePerHour, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        type:
          type: string
          enum: [ps, billiard, air_hockey, babyfoot, other]
        pricePerHour:
          type: number
        status:
          type: string
          enum: [available, busy]
        qrToken:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AssetInput:
      type: object
      required: [name, type, pricePerHour]
      properties:
        name:
          type: string
        nameAr:
          type: string
        type:
          type: string
          enum: [ps, billiard, air_hockey, babyfoot, other]
        pricePerHour:
          type: number

    AssetUpdate:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
        type:
          type: string
          enum: [ps, billiard, air_hockey, babyfoot, other]
        pricePerHour:
          type: number
        status:
          type: string
          enum: [available, busy]

    QrCode:
      type: object
      required: [token, assetId]
      properties:
        token:
          type: string
        assetId:
          type: integer
        qrDataUrl:
          type: ["string", "null"]

    # ── SESSION SCHEMAS ──
    Session:
      type: object
      required: [id, assetId, status, startedAt]
      properties:
        id:
          type: integer
        assetId:
          type: integer
        assetName:
          type: ["string", "null"]
        assetNameAr:
          type: ["string", "null"]
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, ended, cancelled]
        startedAt:
          type: string
          format: date-time
        pausedAt:
          type: ["string", "null"]
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time
        totalMinutes:
          type: ["number", "null"]
        totalCost:
          type: ["number", "null"]
        cancelReason:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    SessionWithBilling:
      type: object
      required: [id, assetId, status, startedAt, currentMinutes, currentCost]
      properties:
        id:
          type: integer
        assetId:
          type: integer
        assetName:
          type: ["string", "null"]
        assetNameAr:
          type: ["string", "null"]
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused]
        startedAt:
          type: string
          format: date-time
        pausedAt:
          type: ["string", "null"]
          format: date-time
        currentMinutes:
          type: number
        currentCost:
          type: number

    SessionLog:
      type: object
      required: [id, action, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
        previousStatus:
          type: ["string", "null"]
        newStatus:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        performedByUserId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    SessionDetail:
      type: object
      required: [id, assetId, status, startedAt, orders]
      properties:
        id:
          type: integer
        assetId:
          type: integer
        assetName:
          type: ["string", "null"]
        assetNameAr:
          type: ["string", "null"]
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, ended, cancelled]
        startedAt:
          type: string
          format: date-time
        pausedAt:
          type: ["string", "null"]
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time
        totalMinutes:
          type: ["number", "null"]
        totalCost:
          type: ["number", "null"]
        cancelReason:
          type: ["string", "null"]
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        sessionLogs:
          type: array
          items:
            $ref: "#/components/schemas/SessionLog"

    SessionInput:
      type: object
      required: [assetId]
      properties:
        assetId:
          type: integer
        notes:
          type: string

    CancelInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    # ── PRODUCT SCHEMAS ──
    Product:
      type: object
      required: [id, name, price, isAvailable, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryNameAr:
          type: ["string", "null"]
        price:
          type: number
        isAvailable:
          type: boolean
        description:
          type: ["string", "null"]
        descriptionAr:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        nameAr:
          type: string
        categoryId:
          type: integer
        price:
          type: number
        description:
          type: string
        descriptionAr:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
        categoryId:
          type: integer
        price:
          type: number
        description:
          type: string
        descriptionAr:
          type: string
        isAvailable:
          type: boolean

    ProductCategory:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ProductCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        nameAr:
          type: string

    # ── PUBLIC MENU SCHEMAS ──
    MenuQrResponse:
      type: object
      required: [token, menuUrl]
      properties:
        token:
          type: ["string", "null"]
        menuUrl:
          type: ["string", "null"]

    PublicMenuTenant:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]

    PublicMenuProduct:
      type: object
      required: [id, name, price, isAvailable]
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        price:
          type: number
        isAvailable:
          type: boolean
        description:
          type: ["string", "null"]
        descriptionAr:
          type: ["string", "null"]

    PublicMenuResponse:
      type: object
      required: [tenant, categories, products]
      properties:
        tenant:
          $ref: "#/components/schemas/PublicMenuTenant"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/ProductCategory"
        products:
          type: array
          items:
            $ref: "#/components/schemas/PublicMenuProduct"

    # ── QR MENU SCHEMAS ──
    QrMenuResponse:
      type: object
      required: [asset, categories, products]
      properties:
        asset:
          $ref: "#/components/schemas/Asset"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/ProductCategory"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        activeSession:
          $ref: "#/components/schemas/Session"

    QrOrderInput:
      type: object
      required: [items]
      properties:
        customerName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
