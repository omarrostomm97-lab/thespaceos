# /etc/nginx/sites-available/thespaceos
# Symlink to /etc/nginx/sites-enabled/thespaceos after copying

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;          # <- replace with your domain or VPS IP

    # Redirect HTTP -> HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    root /var/www/thespaceos/artifacts/gaming-lounge/dist/public;
    index index.html;

    # Static frontend assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API — proxy to Express
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin" always;

    # Hide nginx version
    server_tokens off;
}

